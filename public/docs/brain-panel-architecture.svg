<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/></filter>
  </defs>

  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#e2e8f0">Brain Panel Architecture — Buddha Engine</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" fill="#64748b">Feature-Based Architecture · Domain-Driven · Pure Functions</text>

  <!-- LAYER 1: UI Components -->
  <rect x="25" y="80" width="250" height="170" fill="#1e293b" stroke="#334155" stroke-width="1.5" rx="10" filter="url(#shadow)"/>
  <rect x="25" y="80" width="250" height="30" fill="#3b82f6" rx="10"/>
  <rect x="25" y="100" width="250" height="10" fill="#3b82f6"/>
  <text x="150" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="white">UI Components</text>
  <text x="40" y="130" font-size="10" fill="#94a3b8">components/brain/</text>
  <text x="40" y="150" font-size="10" fill="#e2e8f0">├ BrainPanel (orchestrator)</text>
  <text x="40" y="168" font-size="10" fill="#e2e8f0">├ cards/ CollapsibleCard</text>
  <text x="40" y="186" font-size="10" fill="#e2e8f0">├ gauges/ BrainGauge</text>
  <text x="40" y="204" font-size="10" fill="#e2e8f0">├ layout/ BrainHeader</text>
  <text x="40" y="222" font-size="10" fill="#e2e8f0">└ shared/ InfoPopup</text>

  <!-- LAYER 2: Domain Logic -->
  <rect x="325" y="80" width="250" height="170" fill="#1e293b" stroke="#10b981" stroke-width="1.5" rx="10" filter="url(#shadow)"/>
  <rect x="325" y="80" width="250" height="30" fill="#10b981" rx="10"/>
  <rect x="325" y="100" width="250" height="10" fill="#10b981"/>
  <text x="450" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Domain Logic (Pure Functions)</text>
  <text x="340" y="130" font-size="10" fill="#94a3b8">features/brain/domain/</text>
  <text x="340" y="150" font-size="10" fill="#34d399">├ clearance.ts</text>
  <text x="340" y="168" font-size="10" fill="#34d399">├ eyeStrain.ts</text>
  <text x="340" y="186" font-size="10" fill="#34d399">├ brainScore.ts</text>
  <text x="340" y="204" font-size="10" fill="#34d399">├ accumulation.ts</text>
  <text x="340" y="222" font-size="10" fill="#34d399">└ sleep.ts</text>

  <!-- LAYER 3: State -->
  <rect x="625" y="80" width="250" height="170" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" rx="10" filter="url(#shadow)"/>
  <rect x="625" y="80" width="250" height="30" fill="#f59e0b" rx="10"/>
  <rect x="625" y="100" width="250" height="10" fill="#f59e0b"/>
  <text x="750" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="white">State &amp; Persistence</text>
  <text x="640" y="130" font-size="10" fill="#fbbf24">useState (local)</text>
  <text x="640" y="150" font-size="10" fill="#fbbf24">useEffect (intervals)</text>
  <text x="640" y="168" font-size="10" fill="#fbbf24">localStorage</text>
  <text x="640" y="186" font-size="10" fill="#fbbf24">Notification API</text>
  <text x="640" y="204" font-size="10" fill="#94a3b8">(Future: Zustand store)</text>

  <!-- ARROWS -->
  <line x1="275" y1="165" x2="325" y2="165" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="575" y1="165" x2="625" y2="165" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#475569"/></marker></defs>

  <!-- DATA FLOW SECTION -->
  <rect x="25" y="285" width="850" height="160" fill="#1e293b" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="450" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#64748b">DATA FLOW</text>

  <!-- Flow boxes -->
  <rect x="50" y="325" width="150" height="40" fill="#0f172a" stroke="#3b82f6" stroke-width="1" rx="6"/>
  <text x="125" y="350" text-anchor="middle" font-size="10" fill="#60a5fa">User Input</text>

  <rect x="250" y="325" width="150" height="40" fill="#0f172a" stroke="#10b981" stroke-width="1" rx="6"/>
  <text x="325" y="350" text-anchor="middle" font-size="10" fill="#34d399">Domain Functions</text>

  <rect x="450" y="325" width="150" height="40" fill="#0f172a" stroke="#f59e0b" stroke-width="1" rx="6"/>
  <text x="525" y="350" text-anchor="middle" font-size="10" fill="#fbbf24">State Update</text>

  <rect x="650" y="325" width="150" height="40" fill="#0f172a" stroke="#8b5cf6" stroke-width="1" rx="6"/>
  <text x="725" y="350" text-anchor="middle" font-size="10" fill="#a78bfa">Re-render UI</text>

  <!-- Flow arrows -->
  <line x1="200" y1="345" x2="245" y2="345" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="345" x2="445" y2="345" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="345" x2="645" y2="345" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 1s interval loop -->
  <path d="M 725 365 L 725 395 L 125 395 L 125 370" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrow)"/>
  <text x="425" y="410" text-anchor="middle" font-size="9" fill="#a78bfa">1s interval loop — recalculates all metrics</text>

  <!-- FEATURE LIST -->
  <rect x="25" y="475" width="850" height="65" fill="#1e293b" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="450" y="495" text-anchor="middle" font-size="12" font-weight="bold" fill="#64748b">BRAIN PANEL FEATURES</text>
  <text x="450" y="518" text-anchor="middle" font-size="9" fill="#94a3b8">Brain Health % · Eye Strain /10 · Circadian Clock · Mood (7 states) · Lifestyle (6 factors) · Daily Boosters (4) · Neuro Protection (4 exercises) · Time Simulation · Sleep/Awake Toggle · CSF Notifications · Collapsible Cards · Expanded Dashboard</text>

  <!-- Footer -->
  <text x="450" y="595" text-anchor="middle" font-size="9" fill="#475569">FastMind · Buddha Engine · Domain-Driven Architecture · June 2026</text>
</svg>