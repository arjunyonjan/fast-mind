<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 600" width="100%" height="100%" style="background: radial-gradient(circle at 50% 50%, #030318, #000000); position: fixed; top: 0; left: 0;">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Layer-specific gradients -->
    <radialGradient id="nodeGrad1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#3b82f6"/></radialGradient>
    <radialGradient id="nodeGrad2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#22c55e"/></radialGradient>
    <radialGradient id="nodeGrad3" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#a855f7"/></radialGradient>
    <radialGradient id="nodeGrad4" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#f97316"/></radialGradient>
    <radialGradient id="nodeGrad5" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#ef4444"/></radialGradient>
    <radialGradient id="nodeGrad6" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#ec4899"/></radialGradient>
  </defs>

  <!-- Labels -->
  <text x="100" y="40" fill="#3b82f6" font-family="monospace" font-size="12" text-anchor="middle" opacity="0.9">LAYER 1</text>
  <text x="260" y="40" fill="#22c55e" font-family="monospace" font-size="12" text-anchor="middle" opacity="0.9">LAYER 2</text>
  <text x="440" y="40" fill="#a855f7" font-family="monospace" font-size="12" text-anchor="middle" opacity="0.9">LAYER 3 (FFN)</text>
  <text x="640" y="40" fill="#f97316" font-family="monospace" font-size="12" text-anchor="middle" opacity="0.9">LAYER 4</text>
  <text x="840" y="40" fill="#ef4444" font-family="monospace" font-size="12" text-anchor="middle" opacity="0.9">LAYER 5 (FFN)</text>
  <text x="1040" y="40" fill="#ec4899" font-family="monospace" font-size="12" text-anchor="middle" opacity="0.9">LAYER 6</text>
  <text x="1180" y="40" fill="#ffdd77" font-family="monospace" font-size="12" text-anchor="middle" opacity="0.9">OUTPUT</text>

  <g id="linesLayer" stroke="rgba(255, 190, 75, 0.6)" stroke-width="1.1"></g>

  <g id="nodesLayer">
    <!-- LAYER 1 (Blue) - 4 nodes -->
    <circle cx="100" cy="180" r="8" fill="url(#nodeGrad1)" filter="url(#glow)" class="node" data-layer="0" data-index="0"/>
    <circle cx="100" cy="260" r="8" fill="url(#nodeGrad1)" filter="url(#glow)" class="node" data-layer="0" data-index="1"/>
    <circle cx="100" cy="340" r="8" fill="url(#nodeGrad1)" filter="url(#glow)" class="node" data-layer="0" data-index="2"/>
    <circle cx="100" cy="420" r="8" fill="url(#nodeGrad1)" filter="url(#glow)" class="node" data-layer="0" data-index="3"/>

    <!-- LAYER 2 (Green) - 4 nodes -->
    <circle cx="260" cy="180" r="8" fill="url(#nodeGrad2)" filter="url(#glow)" class="node" data-layer="1" data-index="0"/>
    <circle cx="260" cy="260" r="8" fill="url(#nodeGrad2)" filter="url(#glow)" class="node" data-layer="1" data-index="1"/>
    <circle cx="260" cy="340" r="8" fill="url(#nodeGrad2)" filter="url(#glow)" class="node" data-layer="1" data-index="2"/>
    <circle cx="260" cy="420" r="8" fill="url(#nodeGrad2)" filter="url(#glow)" class="node" data-layer="1" data-index="3"/>

    <!-- LAYER 3 (Purple) - 8 nodes (FFN) -->
    <circle cx="440" cy="90" r="6" fill="url(#nodeGrad3)" filter="url(#glow)" class="node" data-layer="2" data-index="0"/>
    <circle cx="440" cy="150" r="6" fill="url(#nodeGrad3)" filter="url(#glow)" class="node" data-layer="2" data-index="1"/>
    <circle cx="440" cy="210" r="6" fill="url(#nodeGrad3)" filter="url(#glow)" class="node" data-layer="2" data-index="2"/>
    <circle cx="440" cy="270" r="6" fill="url(#nodeGrad3)" filter="url(#glow)" class="node" data-layer="2" data-index="3"/>
    <circle cx="440" cy="330" r="6" fill="url(#nodeGrad3)" filter="url(#glow)" class="node" data-layer="2" data-index="4"/>
    <circle cx="440" cy="390" r="6" fill="url(#nodeGrad3)" filter="url(#glow)" class="node" data-layer="2" data-index="5"/>
    <circle cx="440" cy="450" r="6" fill="url(#nodeGrad3)" filter="url(#glow)" class="node" data-layer="2" data-index="6"/>
    <circle cx="440" cy="510" r="6" fill="url(#nodeGrad3)" filter="url(#glow)" class="node" data-layer="2" data-index="7"/>

    <!-- LAYER 4 (Orange) - 4 nodes -->
    <circle cx="640" cy="180" r="8" fill="url(#nodeGrad4)" filter="url(#glow)" class="node" data-layer="3" data-index="0"/>
    <circle cx="640" cy="260" r="8" fill="url(#nodeGrad4)" filter="url(#glow)" class="node" data-layer="3" data-index="1"/>
    <circle cx="640" cy="340" r="8" fill="url(#nodeGrad4)" filter="url(#glow)" class="node" data-layer="3" data-index="2"/>
    <circle cx="640" cy="420" r="8" fill="url(#nodeGrad4)" filter="url(#glow)" class="node" data-layer="3" data-index="3"/>

    <!-- LAYER 5 (Red) - 8 nodes (second FFN) -->
    <circle cx="840" cy="90" r="6" fill="url(#nodeGrad5)" filter="url(#glow)" class="node" data-layer="4" data-index="0"/>
    <circle cx="840" cy="150" r="6" fill="url(#nodeGrad5)" filter="url(#glow)" class="node" data-layer="4" data-index="1"/>
    <circle cx="840" cy="210" r="6" fill="url(#nodeGrad5)" filter="url(#glow)" class="node" data-layer="4" data-index="2"/>
    <circle cx="840" cy="270" r="6" fill="url(#nodeGrad5)" filter="url(#glow)" class="node" data-layer="4" data-index="3"/>
    <circle cx="840" cy="330" r="6" fill="url(#nodeGrad5)" filter="url(#glow)" class="node" data-layer="4" data-index="4"/>
    <circle cx="840" cy="390" r="6" fill="url(#nodeGrad5)" filter="url(#glow)" class="node" data-layer="4" data-index="5"/>
    <circle cx="840" cy="450" r="6" fill="url(#nodeGrad5)" filter="url(#glow)" class="node" data-layer="4" data-index="6"/>
    <circle cx="840" cy="510" r="6" fill="url(#nodeGrad5)" filter="url(#glow)" class="node" data-layer="4" data-index="7"/>

    <!-- LAYER 6 (Pink) - 4 nodes (pooling) -->
    <circle cx="1040" cy="180" r="8" fill="url(#nodeGrad6)" filter="url(#glow)" class="node" data-layer="5" data-index="0"/>
    <circle cx="1040" cy="260" r="8" fill="url(#nodeGrad6)" filter="url(#glow)" class="node" data-layer="5" data-index="1"/>
    <circle cx="1040" cy="340" r="8" fill="url(#nodeGrad6)" filter="url(#glow)" class="node" data-layer="5" data-index="2"/>
    <circle cx="1040" cy="420" r="8" fill="url(#nodeGrad6)" filter="url(#glow)" class="node" data-layer="5" data-index="3"/>

    <!-- OUTPUT (Gold) - 1 node -->
    <circle cx="1180" cy="300" r="14" fill="url(#nodeGrad)" filter="url(#glow)" class="node" data-layer="6" data-index="0"/>
  </g>

  <text x="660" y="580" fill="#ffdd77" font-family="monospace" font-size="13" text-anchor="middle" filter="url(#glow)">⚡ 4 → 4 → 8 → 4 → 8 → 4 → 1 SBERT ARCHITECTURE (÷100,000) ⚡</text>

  <script type="text/javascript"><![CDATA[
    const nodes = Array.from(document.querySelectorAll('.node'));
    const linesLayer = document.getElementById('linesLayer');
    
    const basePositions = nodes.map(node => ({
      cx: parseFloat(node.getAttribute('cx')),
      cy: parseFloat(node.getAttribute('cy')),
      phaseX: Math.random() * Math.PI * 2,
      phaseY: Math.random() * Math.PI * 2,
      speedX: 0.0008 + Math.random() * 0.0006,
      speedY: 0.0009 + Math.random() * 0.0007
    }));

    function updatePositions(time) {
      nodes.forEach((node, idx) => {
        const base = basePositions[idx];
        const offX = Math.sin(time * base.speedX + base.phaseX) * 6;
        const offY = Math.cos(time * base.speedY + base.phaseY) * 5;
        const newX = base.cx + offX;
        const newY = base.cy + offY;
        node.setAttribute('cx', newX);
        node.setAttribute('cy', newY);
      });
    }

    function drawLines() {
      while (linesLayer.firstChild) linesLayer.removeChild(linesLayer.firstChild);
      
      const layers = [[], [], [], [], [], [], []];
      nodes.forEach(node => {
        const layer = parseInt(node.getAttribute('data-layer'));
        layers[layer].push(node);
      });
      
      for (let i = 0; i < layers.length - 1; i++) {
        for (let a of layers[i]) {
          for (let b of layers[i+1]) {
            const ax = parseFloat(a.getAttribute('cx'));
            const ay = parseFloat(a.getAttribute('cy'));
            const bx = parseFloat(b.getAttribute('cx'));
            const by = parseFloat(b.getAttribute('cy'));
            const dist = Math.hypot(ax-bx, ay-by);
            const opacity = 0.2 + (1 - Math.min(1, dist/220)) * 0.45;
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', ax);
            line.setAttribute('y1', ay);
            line.setAttribute('x2', bx);
            line.setAttribute('y2', by);
            line.setAttribute('stroke', `rgba(255, 190, 75, ${opacity})`);
            line.setAttribute('stroke-width', '1.0');
            line.setAttribute('filter', 'url(#glow)');
            linesLayer.appendChild(line);
          }
        }
      }
    }

    function animate(timestamp) {
      updatePositions(timestamp);
      drawLines();
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  ]]></script>
</svg>