<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ds" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4D6BFE"/><stop offset="100%" stop-color="#7B93FF"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#e2e8f0">🧠 FastMind AI Router — Intent-Based Architecture</text>

  <!-- User Input -->
  <rect x="300" y="55" width="200" height="40" fill="#1e293b" stroke="#4D6BFE" stroke-width="2" rx="20"/>
  <text x="400" y="80" text-anchor="middle" font-size="13" fill="#93a3ff">💬 User Message</text>

  <!-- DeepSeek Classifier -->
  <rect x="280" y="120" width="240" height="45" fill="url(#ds)" rx="10" filter="url(#glow)"/>
  <text x="400" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🤖 DeepSeek Intent Classifier</text>

  <!-- Arrow down -->
  <line x1="400" y1="95" x2="400" y2="118" stroke="#4D6BFE" stroke-width="2"/>

  <!-- Split branches -->
  <line x1="400" y1="165" x2="400" y2="195" stroke="#475569" stroke-width="1.5"/>
  <line x1="80" y1="195" x2="720" y2="195" stroke="#475569" stroke-width="1.5"/>
  <line x1="80" y1="195" x2="80" y2="215" stroke="#475569" stroke-width="1.5"/>
  <line x1="240" y1="195" x2="240" y2="215" stroke="#475569" stroke-width="1.5"/>
  <line x1="400" y1="195" x2="400" y2="215" stroke="#475569" stroke-width="1.5"/>
  <line x1="560" y1="195" x2="560" y2="215" stroke="#475569" stroke-width="1.5"/>
  <line x1="720" y1="195" x2="720" y2="215" stroke="#475569" stroke-width="1.5"/>

  <!-- Intents -->
  <rect x="25" y="215" width="110" height="50" fill="#064e3b" stroke="#10b981" stroke-width="1.5" rx="8"/>
  <text x="80" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="#34d399">📝 create_task</text>
  <text x="80" y="254" text-anchor="middle" font-size="9" fill="#6ee7b7">POST /api/chat</text>

  <rect x="185" y="215" width="110" height="50" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5" rx="8"/>
  <text x="240" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="#a78bfa">📋 list_tasks</text>
  <text x="240" y="254" text-anchor="middle" font-size="9" fill="#c4b5fd">GET /api/tasks</text>

  <rect x="345" y="215" width="110" height="50" fill="#422006" stroke="#f59e0b" stroke-width="1.5" rx="8"/>
  <text x="400" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="#fbbf24">✅ complete_task</text>
  <text x="400" y="254" text-anchor="middle" font-size="9" fill="#fcd34d">PATCH /api/tasks</text>

  <rect x="505" y="215" width="110" height="50" fill="#450a0a" stroke="#ef4444" stroke-width="1.5" rx="8"/>
  <text x="560" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="#f87171">🗑️ delete_task</text>
  <text x="560" y="254" text-anchor="middle" font-size="9" fill="#fca5a5">DELETE /api/tasks</text>

  <rect x="665" y="215" width="110" height="50" fill="#0f172a" stroke="#64748b" stroke-width="1.5" rx="8"/>
  <text x="720" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="#94a3b8">💬 chat</text>
  <text x="720" y="254" text-anchor="middle" font-size="9" fill="#cbd5e1">Text reply only</text>

  <!-- MongoDB -->
  <rect x="250" y="320" width="300" height="35" fill="#064e3b" stroke="#10b981" stroke-width="1" rx="6"/>
  <text x="400" y="342" text-anchor="middle" font-size="11" fill="#34d399">🗄️ MongoDB — tasks / documents / spaces</text>

  <!-- Arrows to DB -->
  <line x1="80" y1="265" x2="80" y2="340" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>
  <line x1="400" y1="265" x2="400" y2="340" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>
  <line x1="560" y1="265" x2="560" y2="340" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>

  <!-- Response -->
  <rect x="300" y="395" width="200" height="35" fill="#1e293b" stroke="#64748b" stroke-width="1" rx="20"/>
  <text x="400" y="418" text-anchor="middle" font-size="12" fill="#e2e8f0">📨 AI Response</text>

  <line x1="400" y1="355" x2="400" y2="393" stroke="#475569" stroke-width="2"/>

  <!-- Footer -->
  <text x="400" y="470" text-anchor="middle" font-size="9" fill="#475569">FastMind · AI Router v1 · DeepSeek-powered</text>
</svg>